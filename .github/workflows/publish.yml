name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token needed.
# Triggers when you publish a GitHub Release, or manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        # --check-url makes re-runs idempotent: already-uploaded files are
        # skipped instead of failing with "File already exists".
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/md-to-pdf-cli/
